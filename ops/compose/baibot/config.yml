homeserver:
  server_name: ryer.org
  url: https://matrix.ryer.org

user:
  mxid_localpart: sam
  password: sam2345
  name: Sam
  encryption:
    recovery_passphrase: null
    recovery_reset_allowed: false

command_prefix: "!bai"

room:
  post_join_self_introduction_enabled: false

access:
  admin_patterns:
    - "@ryer:ryer.org"

persistence:
  data_dir_path: /data
  session_encryption_key: ""
  config_encryption_key: ""

agents:
  static_definitions:
    - id: static/litellm
      provider: openai
      config:
        base_url: http://host.docker.internal:4000/v1
        api_key: ""
        text_generation:
          model_id: sam-fast
          prompt: "You are a brief, helpful assistant."
          temperature: 0.3
          max_response_tokens: 1024
        speech_to_text:
          model_id: whisper-1
        text_to_speech:
          model_id: sam-fast
          voice: onyx
          speed: 1.0
          response_format: opus
    - id: litellm
      provider: openai
      config:
        base_url: http://host.docker.internal:4000/v1
        api_key: ""
        text_generation:
          model_id: sam-fast
          prompt: "You are a brief, helpful assistant."
          temperature: 0.3
          max_response_tokens: 1024
        speech_to_text:
          model_id: whisper-1
        text_to_speech:
          model_id: sam-fast
          voice: onyx
          speed: 1.0
          response_format: opus

initial_global_config:
  handler:
    # Disable unsolicited chat replies (this was causing @sam:ryer.org to respond in every room).
    # Keep TTS/STT handlers available for explicit commands.
    catch_all: null
    text_generation: null
    text_to_speech: static/litellm
    speech_to_text: static/litellm
    image_generation: null
  # Restrict Baibot processing to specific users (commands-only intent).
  # NOTE: Baibot commands use command_prefix (!bai) so this keeps the bot from
  # replying to general room chatter from other users.
  user_patterns:
    - "@david:ryer.org"
    - "@ryer:ryer.org"

logging: warn,mxlink=debug,baibot=debug
