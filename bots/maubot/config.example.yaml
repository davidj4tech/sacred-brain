# Text trigger that should be present in the message body
mention: "@sacredbrain"

# Optional allowlist of room IDs; leave empty to listen everywhere the bot user is present
allow_rooms: []

# Optional persona key forwarded to Sacred Brain
persona: null

# Number of recent messages to send as context (best-effort)
context_limit: 10

# Sacred Brain Matrix handler endpoint
sacred_brain_url: "http://127.0.0.1:8000/matrix/respond"

# Optional API key sent as X-API-Key header
api_key: null

# HTTP timeout when calling Sacred Brain
timeout_seconds: 30
